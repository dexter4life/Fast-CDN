version: "3.8"

services:
  cdn:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9090:9090"
    volumes:
      - cdn-cache:/var/cache/cdn
    environment:
      CDN_SERVER_HTTP_ADDR: "0.0.0.0:8080"
      CDN_S3_ENDPOINT: "http://minio:9000"
      CDN_S3_REGION: "us-east-1"
      CDN_S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      CDN_S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      CDN_S3_DEFAULT_BUCKET: "assets"
      CDN_CACHE_PATH: "/var/cache/cdn"
      CDN_LOG_LEVEL: "info"
      CDN_LOG_FORMAT: "json"
      # CDN_HMAC_SECRET: "" # Uncomment and set for signed URLs
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/cdn-engine", "--build-info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Creates the default bucket on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/assets --ignore-existing;
      mc policy set download local/assets;
      exit 0;
      "

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - cdn
    profiles:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  cdn-cache:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: cdn-network
