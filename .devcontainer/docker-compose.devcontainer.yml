version: "3.8"

services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    environment:
      CDN_SERVER_HTTP_ADDR: "0.0.0.0:8080"
      CDN_S3_ENDPOINT: "http://minio:9000"
      CDN_S3_REGION: "us-east-1"
      CDN_S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      CDN_S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      CDN_S3_DEFAULT_BUCKET: "assets"
      CDN_CACHE_PATH: "/var/cache/cdn"
      CDN_LOG_LEVEL: "debug"
      CDN_LOG_FORMAT: "pretty"
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9090:9090"
    depends_on:
      minio:
        condition: service_healthy
    command: sleep infinity

  # Override cdn service to not start automatically in dev
  cdn:
    profiles:
      - production

volumes:
  cargo-cache:
  target-cache:
